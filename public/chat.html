<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyLM Chat</title>
    <meta name="description" content="Chat with AI models via AnyLM">
    <link rel="icon" type="image/svg+xml" href="/favicon-animated.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #e1e8ed; }

        .container { width: 100%; height: 100vh; display: flex; flex-direction: column; }

        .header {
            border-bottom: 1px solid var(--border, #1a2332);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-alt, #101829);
        }

        .header h1 { font-size: 18px; font-weight: 700; }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .credit-badge {
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 6px;
            font-size: 13px;
            color: #22c55e;
        }

        .btn {
            padding: 8px 16px;
            background: var(--bg-code, #1a2332);
            border: 1px solid var(--border, #2a3a52);
            border-radius: 6px;
            color: #e1e8ed;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover { background: #2a3a52; border-color: #3a4a62; }
        .btn.primary { background: #3b82f6; border-color: #3b82f6; }
        .btn.primary:hover { background: #2563eb; }

        .main { flex: 1; display: flex; min-height: 0; }

        .api-key-prompt {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .api-key-card {
            width: 100%;
            max-width: 400px;
            padding: 32px;
            background: var(--bg-card, #161d2e);
            border: 1px solid var(--border, #1a2332);
            border-radius: 12px;
        }

        .api-key-card h2 { margin-bottom: 12px; font-size: 20px; }
        .api-key-card p { margin-bottom: 24px; color: #a1afc9; font-size: 14px; }

        .api-key-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .api-key-input-group input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg, #0a0e27);
            border: 1px solid var(--border, #1a2332);
            border-radius: 6px;
            color: #e1e8ed;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .api-key-card .btn { width: 100%; }

        .chat-wrapper {
            flex: 1;
            display: none;
            flex-direction: column;
            min-width: 0;
        }

        .chat-wrapper.active { display: flex; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message-user {
            background: #3b82f6;
            align-self: flex-end;
        }

        .message-assistant {
            background: var(--bg-code, #1a2332);
            align-self: flex-start;
            border: 1px solid var(--border, #2a3a52);
        }

        .message pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-area {
            border-top: 1px solid var(--border, #1a2332);
            padding: 16px 24px;
            background: var(--bg-alt, #101829);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-controls {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg, #0a0e27);
            border: 1px solid var(--border, #1a2332);
            border-radius: 6px;
            color: #e1e8ed;
            resize: none;
            max-height: 100px;
            font-family: 'Inter', sans-serif;
        }

        #model-select {
            padding: 8px 12px;
            background: var(--bg, #0a0e27);
            border: 1px solid var(--border, #1a2332);
            border-radius: 6px;
            color: #e1e8ed;
            min-width: 180px;
        }

        #status-bar {
            padding: 0 24px;
            height: 24px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #8a96ab;
            border-top: 1px solid var(--border, #1a2332);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-card, #161d2e);
            border: 1px solid var(--border, #1a2332);
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            border-bottom: 1px solid var(--border, #1a2332);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 18px; }
        .modal-header .close-btn { background: none; border: none; color: #e1e8ed; cursor: pointer; font-size: 20px; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .key-item {
            padding: 12px;
            background: var(--bg, #0a0e27);
            border: 1px solid var(--border, #1a2332);
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .key-info {
            flex: 1;
        }

        .key-label { font-weight: 600; margin-bottom: 4px; }
        .key-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8a96ab; }
        .key-meta { font-size: 11px; color: #5a6a7b; margin-top: 4px; }

        .key-item button {
            padding: 6px 12px;
            margin-left: 8px;
            font-size: 12px;
        }

        .new-key-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .new-key-input input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg, #0a0e27);
            border: 1px solid var(--border, #1a2332);
            border-radius: 6px;
            color: #e1e8ed;
        }

        @media (max-width: 768px) {
            .message { max-width: 90%; }
            .api-key-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>AnyLM Chat</h1>
            <div class="header-right">
                <div class="credit-badge">Balance: $<span id="credit-balance">0.00</span></div>
                <button class="btn" id="api-keys-btn">API Keys</button>
                <button class="btn" id="logout-btn">Logout</button>
            </div>
        </div>

        <!-- Main Area -->
        <div class="main">
            <!-- API Key Prompt -->
            <div class="api-key-prompt" id="api-key-area">
                <div class="api-key-card">
                    <h2>Enter API Key</h2>
                    <p>Paste your API key to start chatting with free models. Get one from your dashboard.</p>
                    <div class="api-key-input-group">
                        <input type="password" id="api-key-input" placeholder="any-..." />
                        <button class="btn primary" id="api-key-btn">Connect</button>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-wrapper" id="chat-wrapper">
                <div id="chat-container"></div>
                <div class="input-area">
                    <div class="input-controls">
                        <select id="model-select"></select>
                        <textarea id="message-input" placeholder="Type a message... (Shift+Enter for new line)" rows="1"></textarea>
                        <button class="btn primary" id="send-btn">Send</button>
                    </div>
                </div>
                <div id="status-bar">Ready</div>
            </div>
        </div>
    </div>

    <!-- API Keys Modal -->
    <div class="modal-overlay" id="keys-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>API Keys</h2>
                <button class="close-btn" id="keys-close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="new-key-input">
                    <input type="text" id="key-label-input" placeholder="Label (optional)" />
                    <button class="btn primary" id="create-key-btn">Create Key</button>
                </div>
                <div id="keys-list"></div>
            </div>
        </div>
    </div>

    <script src="/chat.js"></script>
</body>
</html>
