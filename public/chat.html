<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AnymousxeAPI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon-animated.svg">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/chat.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <i data-lucide="zap" class="icon-md blur-icon"></i>
                <h2>Welcome Back</h2>
                <p>Login or create an account to start chatting.</p>
            </div>
            <form id="auth-form" class="auth-form">
                <div class="input-group" id="username-group" style="display: none;">
                    <label>Username (Sign Up Only)</label>
                    <input type="text" id="auth-username" placeholder="cool_user_123">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                <div class="auth-buttons">
                    <button type="button" class="btn btn-white" id="btn-login">Login</button>
                    <button type="button" class="btn btn-outline" id="btn-signup">Sign Up</button>
                </div>
                <div id="auth-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <i data-lucide="plus" class="icon-sm"></i>
                    New Chat
                </button>
                <button class="sidebar-toggle-mobile" id="close-sidebar-btn">
                    <i data-lucide="x" class="icon-sm"></i>
                </button>
            </div>
            <div class="history-list" id="history-list">
                <div class="history-label">Recents</div>
                <!-- chats appended here dynamically -->
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <div class="user-email" id="user-email">email@example.com</div>
                        <div class="user-plan" id="user-plan-badge">Free Plan</div>
                    </div>
                </div>
                <button class="btn-icon" id="logout-btn" title="Logout">
                    <i data-lucide="log-out" class="icon-sm"></i>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-chat">
            <header class="chat-header">
                <button class="menu-btn" id="menu-btn">
                    <i data-lucide="menu" class="icon-sm"></i>
                </button>
                <div class="model-selector-wrapper">
                    <select id="model-select" class="model-select">
                        <option value="gpt-5.4">GPT-5.4</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                        <option value="qwen3-coder">Qwen3 Coder</option>
                        <option value="deepseek-v3.2">DeepSeek V3.2</option>
                        <option value="kimi-k2.5">Kimi K2.5</option>
                        <option value="glm-5">GLM-5</option>
                        <option value="claude-haiku-4.5" disabled>Claude Haiku 4.5 (Plus)</option>
                        <option value="claude-sonnet-4.6" disabled>Claude Sonnet 4.6 (Plus)</option>
                        <option value="grok-4.1-fast-reasoning" disabled>Grok 4.1 Fast (Reasoning - Plus)</option>
                        <option value="grok-4.1-fast-non-reasoning" disabled>Grok 4.1 Fast (Non-Reasoning - Plus)
                        </option>
                        <option value="opus" disabled>Claude Opus (Pro)</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-icon"></i>
                </div>
            </header>

            <div class="chat-container">
                <div class="messages" id="messages-container">
                    <!-- Default State -->
                    <div class="empty-state" id="empty-state">
                        <i data-lucide="sparkles" class="empty-icon"></i>
                        <h2>How can I help you today?</h2>
                    </div>
                    <!-- Messages appended here dynamically -->
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="chat-textarea" placeholder="Message the AI..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn">
                            <i data-lucide="arrow-up" class="icon-sm"></i>
                        </button>
                    </div>
                    <div class="disclaimer">
                        Models may produce inaccurate information. Please verify important details.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for thinking block -->
    <template id="thinking-template">
        <div class="message assistant">
            <div class="message-content">
                <details class="thinking-block">
                    <summary>
                        <div class="thinking-header">
                            <span class="pulse-dot"></span>
                            <span class="thinking-text">Thinking Process</span>
                            <i data-lucide="chevron-down" class="expand-icon"></i>
                        </div>
                    </summary>
                    <div class="thinking-body"></div>
                </details>
                <div class="response-body"></div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/chat.js"></script>
</body>

</html>
