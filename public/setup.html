<!DOCTYPE html>
<html>
<head>
    <title>Admin Setup</title>
    <style>
        body { font-family: sans-serif; background: #0a0e27; color: #e1e8ed; padding: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #161d2e; padding: 30px; border-radius: 12px; border: 1px solid #2a3a52; }
        h1 { margin-top: 0; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 10px; background: #0a0e27; border: 1px solid #2a3a52; border-radius: 6px; color: #e1e8ed; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #2563eb; }
        .result { margin-top: 20px; padding: 15px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 6px; color: #4ade80; display: none; }
        .error { background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.3); color: #f43f5e; }
        code { background: #0a0e27; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 Admin Setup</h1>
            <p>This page creates the admin account. Use it once, then delete it.</p>

            <div class="input-group">
                <label>Username:</label>
                <input type="text" id="username" value="anymousxe" />
            </div>

            <div class="input-group">
                <label>Email:</label>
                <input type="email" id="email" value="anymousxe.info@gmail.com" />
            </div>

            <div class="input-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter a password" />
            </div>

            <button onclick="createAdmin()">Create Admin Account</button>

            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        async function createAdmin() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                showResult('All fields required', true);
                return;
            }

            if (password.length < 6) {
                showResult('Password must be at least 6 characters', true);
                return;
            }

            try {
                // Initialize Supabase from config
                const cfgRes = await fetch('/v1/config');
                const cfg = await cfgRes.json();

                if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
                    throw new Error('Supabase config not available');
                }

                const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

                // Sign up
                const { error: signupError } = await sb.auth.signUp({
                    email,
                    password,
                    options: { data: { username } }
                });

                if (signupError) throw signupError;

                // Auto login
                const { error: loginError } = await sb.auth.signInWithPassword({ email, password });
                if (loginError) throw loginError;

                showResult(`✅ Admin account created! Logging you in...`, false);

                setTimeout(() => {
                    window.location.href = '/chat';
                }, 2000);

            } catch (err) {
                showResult(`❌ Error: ${err.message}`, true);
            }
        }

        function showResult(msg, isError) {
            const el = document.getElementById('result');
            el.textContent = msg;
            el.className = 'result' + (isError ? ' error' : '');
            el.style.display = 'block';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
