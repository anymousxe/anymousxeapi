name = "anylm"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

[vars]
# Non-secret vars can go here
# All secrets (API keys, Supabase keys, etc.) must be set via:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put API_KEY_1
#   ... through API_KEY_15
#   wrangler secret put MOONPAY_API_KEY
#   wrangler secret put MOONPAY_WEBHOOK_SECRET
#   wrangler secret put MOONPAY_PUBLISHABLE_KEY
# Or set them in Cloudflare Dashboard → Workers → Settings → Variables & Secrets
